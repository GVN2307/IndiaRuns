reproduce_command: "python hackathon_rank.py --candidates data/candidates.jsonl.gz --jd data/job_description.md --output output/submission.csv --embeddings models/candidate_embeddings.npy --index models/faiss_index.bin"

compute:
  platform: "Local Windows, 16GB RAM"
  cpu_cores: 8
  ram_gb: 16
  python_version: "3.11.4"
  os: "Windows 11"
  uses_gpu_for_inference: false
  has_network_during_ranking: false
  pre_computation_required: true
  pre_computation_time_minutes: 105

ai_tools_used:
  - "Gemini"
ai_usage_summary: |
  Used Gemini for code synthesis, architecture planning, and structured ranking logic. No candidate data was shared with external LLMs during ranking.

methodology_summary: |
  3-score hybrid ranker blending Dense Semantic similarity, Rule-based Structured features (with Gaussian experience decay and product/consulting biases), and FAISS retrieval index scores. Includes a robust 6-tier honeypot detector to cap impossible profiles at score 20, deterministic tie-breaking, and LLM-surrogate prediction blending.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
